name: Build Manuscript

on:
  push:
    branches: [main]
    paths:
      - 'manuscript/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Assemble chapters
        run: |
          mkdir -p build
          for f in $(ls manuscript/chapters/*.md 2>/dev/null | sort); do
            cat "$f"
            echo
          done > build/chronikon-assembled.md

      - name: Build PDF
        run: |
          pandoc build/chronikon-assembled.md \
            --metadata-file=manuscript/metadata.yaml \
            -o build/chronikon.pdf || \
          pandoc build/chronikon-assembled.md \
            --metadata title="Chronikon" \
            -o build/chronikon.pdf

      - name: Build epub
        run: |
          pandoc build/chronikon-assembled.md \
            --metadata-file=manuscript/metadata.yaml \
            -o build/chronikon.epub

      - name: Build HTML
        run: |
          pandoc build/chronikon-assembled.md \
            --metadata-file=manuscript/metadata.yaml \
            --standalone \
            --css=build/chronikon.css \
            -o build/chronikon.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronikon-manuscript
          path: |
            build/chronikon.pdf
            build/chronikon.epub
            build/chronikon.html
          retention-days: 30
